name: Daily Stock Strategy Report

on:
  schedule:
    # 한국 시간(KST) 월~금 오전 09:36 실행 (UTC 00:36)
    - cron: '36 0 * * 1-5'
  
  # 🔥 이 줄이 있어야 "Run workflow" 버튼이 생깁니다!
  workflow_dispatch: 

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install yfinance beautifulsoup4 lxml requests

      - name: Run Script
        env:
          EMAIL_ADDRESS: ${{ secrets.EMAIL_ADDRESS }}
          EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        run: python main.py
